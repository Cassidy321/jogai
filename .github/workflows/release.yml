name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew-tap:
    name: Update Homebrew Tap
    runs-on: macos-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: Cassidy321/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Update formula
        run: ./scripts/update-homebrew-formula.sh "${GITHUB_REF_NAME}" "${GITHUB_WORKSPACE}/homebrew-tap/Formula/jogai.rb"
      - name: Smoke test formula
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew install --build-from-source "${GITHUB_WORKSPACE}/homebrew-tap/Formula/jogai.rb"
          brew test jogai
      - name: Commit and push tap changes
        working-directory: homebrew-tap
        run: |
          if git diff --quiet -- .; then
            echo "No tap changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/jogai.rb
          git commit -m "chore: update jogai to ${GITHUB_REF_NAME}"
          git push
